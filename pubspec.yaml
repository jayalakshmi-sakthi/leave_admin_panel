name: leave_admin_panel
description: "LeaveX Admin Web Panel"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI icons
  cupertino_icons: ^1.0.8

  # 🔥 Firebase (UPDATED)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  intl: ^0.19.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  onesignal_flutter: ^5.2.0
  http: ^1.2.0
  url_launcher: ^6.3.2
  excel: ^4.0.6
  printing: ^5.13.1
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  shared_preferences: ^2.5.3
  table_calendar: ^3.1.3
  pdf: ^3.11.3
  syncfusion_flutter_pdfviewer: ^29.1.38

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#7C3AED"
    theme_color: "#7C3AED"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48

