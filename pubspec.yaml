name: leave_admin_panel
description: "LeaveX Admin Web Panel"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI icons
  cupertino_icons: ^1.0.8

  # 🔥 Firebase (REQUIRED)
  firebase_core: ^2.25.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  intl: ^0.19.0
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.0.0
  url_launcher: ^6.3.2
  excel: ^4.0.6
  printing: ^5.13.1
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  shared_preferences: ^2.5.3
  table_calendar: ^3.1.3
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/

flutter_launcher_icons:
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#7C3AED" 
    theme_color: "#7C3AED"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48 # standard Windows icon size
  image_path: "assets/logo.png"

