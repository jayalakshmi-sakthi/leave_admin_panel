<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">

  <!-- 🚀 DNS preconnect — reduce latency for Firebase/Google domains -->
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fcmregistrations.googleapis.com">
  <link rel="dns-prefetch" href="https://fcm.googleapis.com">

  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LeaveX Admin Panel">
  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LeaveX Admin">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.json">

  <title>LeaveX Admin</title>

  <style>
    body {
      background-color: #F8FAFC;
      margin: 0;
      padding: 0;
    }

    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #F8FAFC;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity 0.4s ease-out;
    }

    .loading-spinner {
      margin-top: 16px;
      width: 32px;
      height: 32px;
      border: 3px solid #E2E8F0;
      border-top-color: #7C3AED;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      margin-top: 12px;
      color: #64748B;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>
  <div id="flutter-splash" class="loading-container">
    <!-- Optional: Add logo here -->
    <div style="font-size: 24px; font-weight: bold; color: #1E293B;">LeaveX Admin</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Preparing Dashboard...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Fades out splash once Flutter starts rendering
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('flutter-splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(function () { splash.style.display = 'none'; }, 400);
      }
    });

    // Safety fallback: ensure splash is removed after 15 seconds
    setTimeout(function () {
      var splash = document.getElementById('flutter-splash');
      if (splash) {
        splash.style.display = 'none';
      }
    }, 15000);
  </script>
</body>

</html>
