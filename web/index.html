<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">

  <!-- 🚀 DNS preconnect — reduce latency for Firebase/Google domains -->
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fcmregistrations.googleapis.com">
  <link rel="dns-prefetch" href="https://fcm.googleapis.com">

  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LeaveX Admin Panel">
  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LeaveX Admin">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.json">

  <title>LeaveX Admin</title>

  <style>
    body {
      background-color: #F8FAFC;
      margin: 0;
      padding: 0;
    }

    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #F4F6FA, #E8EDF6);
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .loading-spinner {
      margin-top: 16px;
      width: 32px;
      height: 32px;
      border: 3px solid #E2E8F0;
      border-top-color: #7C3AED;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      margin-top: 12px;
      color: #64748B;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* ✨ Smart Update Overlay (Premium Design) */
    #pwa-update-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 24px;
    }

    #pwa-update-overlay.show {
      display: flex;
    }

    .update-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 400px;
      width: 100%;
    }

    .update-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .update-title {
      font-size: 24px;
      font-weight: 800;
      color: #1E293B;
      margin-bottom: 12px;
    }

    .update-message {
      color: #64748B;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    #update-now-button {
      background: #7C3AED;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    #update-now-button:hover {
      background: #6D28D9;
      transform: translateY(-2px);
    }

    #debug-console {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.85);
      color: #00FF00;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      padding: 15px;
      border-radius: 8px;
      z-index: 10001;
      display: none;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }

    #debug-console.show {
      display: block;
    }
  </style>

  <!-- 🔔 OneSignal SDK (Free Layer 2 Notifications) -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignal = window.OneSignal || [];
    
    // Helper function for Flutter to initialize OneSignal with a Specific App ID
    window.initOneSignal = function(appId) {
      console.log("🔔 [OneSignal] Initializing Admin with ID: " + appId);
      OneSignal.push(async function() {
        await OneSignal.init({
          appId: appId,
          allowLocalhostAsSecureOrigin: true,
          // 🛡️ standard PWA root scope
          notifyButton: { enable: true }, 
        });
        console.log("✅ [OneSignal] Admin init complete");
        
        // ✅ CRITICAL: Request browser notification permission
        const permission = await OneSignal.Notifications.requestPermission();
        console.log("🔔 [OneSignal] Admin Permission:", permission);

        // ✅ Listen for notification clicks — redirect to the detail page
        OneSignal.Notifications.addEventListener('click', function(event) {
          const data = event.notification.additionalData;
          console.log("🔔 [OneSignal] Admin notification clicked:", data);
          if (data && data.relatedId) {
            const year = data.academicYearId || '2024-2025';
            const url = window.location.origin + window.location.pathname
              + '#/detail?id=' + encodeURIComponent(data.relatedId)
              + '&year=' + encodeURIComponent(year);
            window.open(url, '_self');
          }
        });
      });
    };

    // Helper function for Flutter to set external user ID (mapping to Firestore UID)
    window.setOneSignalUser = function(externalId) {
      console.log("🔗 [OneSignal] Linking Admin User: " + externalId);
      OneSignal.push(async function() {
        await OneSignal.login(externalId);
        console.log("✅ [OneSignal] Admin user linked:", externalId);
      });
    };

    // Helper function for Flutter to logout
    window.logoutOneSignal = function() {
      OneSignal.push(async function() {
        await OneSignal.logout();
        console.log("🚪 [OneSignal] Admin user logged out");
      });
    };
  </script>
</head>

<body>
  <div id="flutter-splash" class="loading-container">
    <img src="assets/assets/logo.png" style="width: 200px; height: 200px; margin-bottom: 24px; object-fit: contain;" onerror="this.src='favicon.png'" />
    <div style="font-size: 32px; font-weight: 800; color: #1E293B; letter-spacing: -0.5px;">LeaveX Admin</div>
    <div style="font-size: 14px; color: #64748B; margin-top: 8px; margin-bottom: 32px; font-weight: 500;">Control • Oversee • Empower</div>
    <div class="loading-spinner"></div>
  </div>

  <div id="debug-console">
    <div style="font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #00FF00;">🔧 Admin Boot Debugger</div>
    <div id="debug-logs"></div>
    <div style="margin-top: 10px; font-size: 10px; color: #AAA;">App stuck? Please share these logs.</div>
  </div>

  <!-- Smart Update Overlay -->
  <div id="pwa-update-overlay">
    <div class="update-card">
      <div class="update-icon">🚀</div>
      <div class="update-title">Update Available</div>
      <div class="update-message">A fresh version of LeaveX Admin is ready with important improvements.</div>
      <button id="update-now-button" onclick="window.forceUpdateApp()">Update Now</button>
    </div>
  </div>

  <script src="flutter_bootstrap.js?v=20260310v2" async></script>

  <script>
    (function() {
      const logs = [];
      function addLog(msg) {
        const timestamp = new Date().toLocaleTimeString();
        const line = `[${timestamp}] ${msg}`;
        console.log(line);
        logs.push(line);
        const logEl = document.getElementById('debug-logs');
        if (logEl) {
          const div = document.createElement('div');
          div.textContent = line;
          logEl.appendChild(div);
          logEl.scrollTop = logEl.scrollHeight;
        }
      }

      addLog("🚀 [BOOT] Admin Initializing...");
      
      var splashRemoved = false;
      function removeSplash(source) {
        if (splashRemoved) return;
        splashRemoved = true;
        addLog("🌊 [BOOT] Hiding Splash via: " + source);
        var splash = document.getElementById('flutter-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() { 
            if (splash.parentNode) splash.parentNode.removeChild(splash); 
            addLog("✅ [BOOT] Admin Splash removed");
            document.getElementById('debug-console').classList.remove('show');
          }, 400);
        }
      }

      window.addEventListener('flutter-first-frame', function() { removeSplash('flutter-first-frame'); });
      
      // Silent Debugger
      setTimeout(function() {
        if (!splashRemoved) {
          addLog("🕒 [WARNING] Admin taking long load...");
          // No auto-show for console
        }
      }, 10000);

      setTimeout(function() { removeSplash('timeout-fallback'); }, 15000);

      setTimeout(function() {
        if (!splashRemoved) {
          addLog("🚨 [CRITICAL] ADMIN HANG! Triggering Recovery...");
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (let registration of registrations) { registration.unregister(); }
              localStorage.clear();
              sessionStorage.clear();
              window.location.reload(true);
            });
          } else { window.location.reload(true); }
        }
      }, 25000);

      let swRegistration;
      let refreshing = false;

      async function checkVersion() {
        addLog("📡 [BOOT] Checking Admin server version...");
        try {
          const response = await fetch('version.json?v=' + Date.now(), {
            cache: 'no-store',
            headers: { 'pragma': 'no-cache', 'cache-control': 'no-cache' }
          });
          if (!response.ok) { addLog("⚠️ [BOOT] Version check returned: " + response.status); return; }

          const contentType = response.headers.get('content-type');
          if (!contentType || !contentType.includes('application/json')) {
            addLog("⚠️ [BOOT] Invalid content-type for version.json");
            return;
          }

          const data = await response.json();
          const latestVersion = data.version;
          const storedVersion = localStorage.getItem('app-version');

          if (storedVersion && storedVersion !== latestVersion) {
            addLog("🚨 [CRITICAL] Admin App Outdated! Purging Cache & Hard Reloading...");
            localStorage.setItem('app-version', latestVersion);
            
            // 🛡️ Heavyweight Purge Strategy
            if ('serviceWorker' in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              for (let reg of regs) { await reg.unregister(); }
            }
            if ('caches' in window) {
              const keys = await caches.keys();
              for (let key of keys) { await caches.delete(key); }
            }
            
            addLog("🔄 [BOOT] Admin Purge complete. Reloading...");
            // Hard reload via location.href trick
            window.location.href = window.location.origin + window.location.pathname + '?v=' + latestVersion;
            return;
          } else if (!storedVersion) {
            localStorage.setItem('app-version', latestVersion);
            addLog("✅ [BOOT] Version set to " + latestVersion);
          } else {
            addLog("✅ [BOOT] Admin is up to date");
          }
        } catch (e) { addLog("⚠️ [BOOT] Admin version check error: " + e.message); }
      }

      window.forceUpdateApp = function() {
        addLog("♻️ [BOOT] Forcing Admin Update...");
        const btn = document.getElementById('update-now-button');
        if (btn) { btn.disabled = true; btn.innerText = 'Updating...'; }
        
        // Finalize the version update in storage only now
        fetch('version.json?v=' + Date.now()).then(r => r.json()).then(data => {
            localStorage.setItem('app-version', data.version);
            addLog("✅ [BOOT] Version updated in storage to " + data.version);
            if (swRegistration && swRegistration.waiting) {
              swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
            } else {
              window.location.reload(true);
            }
        }).catch(() => {
            window.location.reload(true);
        });
      };

      window.addEventListener('load', function(ev) {
        addLog("📦 [BOOT] Admin Window Loaded");
        // 🔄 Proactively check for new version before/during Flutter load
        checkVersion(); 
        
        _flutter.loader.load({
          serviceWorkerSettings: {
            serviceWorkerVersion: {{flutter_service_worker_version}},
          },
          onEntrypointLoaded: function(engineInitializer) {
            addLog("⚙️ [BOOT] Admin Entrypoint Ready");
            engineInitializer.initializeEngine().then(function(appRunner) {
              addLog("⚙️ [BOOT] Admin Engine Initialized");
              appRunner.runApp();
              setTimeout(() => removeSplash('run-app-heartbeat'), 1000);
            });
          }
        }).then(function(reg) {
          swRegistration = reg;
          addLog('✅ [BOOT] Admin Bootstrap Complete');
          if (reg) {
            reg.addEventListener('updatefound', () => {
              addLog("🔍 [BOOT] Admin SW Update detected...");
              const installingWorker = reg.installing;
              if (installingWorker) {
                installingWorker.addEventListener('statechange', () => {
                  addLog("ℹ️ [BOOT] Admin SW State: " + installingWorker.state);
                  if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    addLog("♻️ [BOOT] New Admin SW ready");
                  }
                });
              }
            });
          }
          checkVersion();
          setInterval(checkVersion, 1000 * 60 * 15);
        }).catch(err => addLog("❌ [BOOT] Admin Failure: " + err));

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) { refreshing = true; addLog("🔄 [BOOT] Controller changed, reloading..."); window.location.reload(); }
          });
        }
      });
    })();
  </script>
</body>

</html>
